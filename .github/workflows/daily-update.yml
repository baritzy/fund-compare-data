name: Daily Fund Data Update

on:
  schedule:
    # 03:00 UTC = 06:00 Israel time
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install yfinance beautifulsoup4 requests

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Run update script
        run: python update-data.py

      - name: Commit and push if changed
        run: |
          git config user.name "Fund Compare Bot"
          git config user.email "bot@shavve.app"
          git add -A
          git diff --cached --quiet || git commit -m "Daily update $(date -u +%Y-%m-%d)"
          git push
